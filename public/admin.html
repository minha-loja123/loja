<!DOCTYPE html>
<html>
<head>
  <title>Admin Loja</title>

  <style>
    body {
      font-family: Arial;
      background:#f5f5f5;
      padding:20px;
    }

    .box {
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      margin:auto;
    }

    input, button {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
      border:1px solid #ccc;
    }

    button {
      background:#ee4d2d;
      color:white;
      border:none;
      cursor:pointer;
    }

    .hidden { display:none; }

    .item {
      background:#eee;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>🔐 Login Admin</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div class="box hidden" id="adminBox">
  <h2>🔥 Produtos</h2>

  <input id="nome" placeholder="Nome">
  <input id="preco" placeholder="Preço">
  <input id="img" placeholder="Imagem URL">

  <button onclick="criar()">Criar Produto</button>

  <div id="lista"></div>
</div>

<script>

let token = localStorage.getItem("token");

const loginBox = document.getElementById("loginBox");
const adminBox = document.getElementById("adminBox");

// se já logado
if(token){
  loginBox.classList.add("hidden");
  adminBox.classList.remove("hidden");
  carregar();
}

// LOGIN
function login(){

  fetch("https://loja-cd3v.onrender.com/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  })
  .then(r => r.json())
  .then(data => {

    if(data.token){
      localStorage.setItem("token", data.token);
      location.reload();
    } else {
      alert(data.erro || "Login inválido");
    }

  })
  .catch(err => {
    console.log(err);
    alert("Erro no login");
  });
}

// CRIAR PRODUTO
function criar(){

  fetch("https://loja-cd3v.onrender.com/admin/produto", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      nome: nome.value,
      preco: Number(preco.value),
      img: img.value
    })
  })
  .then(() => carregar());
}

// LISTAR
function carregar(){

  fetch("https://loja-cd3v.onrender.com/produtos")
  .then(r => r.json())
  .then(data => {

    lista.innerHTML = "";

    data.forEach(p => {
      lista.innerHTML += `
        <div class="item">
          <b>${p.nome}</b><br>
          R$ ${p.preco}
        </div>
      `;
    });

  });

}

</script>

</body>
</html>
