<!DOCTYPE html>
<html>
<head>
<title>Admin Max</title>
</head>

<body>

<h2>Login</h2>
<input id="u">
<input id="p">
<button onclick="login()">Entrar</button>

<hr>

<h2>Produtos</h2>
<input id="n">
<input id="pr">
<input id="i">
<input id="c">
<button onclick="add()">Criar</button>

<div id="list"></div>

<hr>

<h2>Pedidos</h2>
<div id="pedidos"></div>

<script>

let token="";

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.json())
.then(d=>{
token=d.token;
load();
});
}

function add(){
fetch("/admin/produto",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nome:n.value,
preco:pr.value,
img:i.value,
categoria:c.value
})
})
.then(()=>load());
}

function load(){
fetch("/produtos")
.then(r=>r.json())
.then(d=>{
list.innerHTML="";
d.forEach(p=>{
list.innerHTML+=`
<div>
${p.nome} - R$${p.preco}
<button onclick="del('${p._id}')">Excluir</button>
</div>`;
});
});

fetch("/admin/pedidos")
.then(r=>r.json())
.then(d=>{
pedidos.innerHTML="";
d.forEach(p=>{
pedidos.innerHTML+=`
<div>
Total: ${p.total}
Status: ${p.status}
<button onclick="st('${p._id}','enviado')">Enviar</button>
<button onclick="st('${p._id}','entregue')">Entregue</button>
</div>`;
});
});
}

function del(id){
fetch("/admin/produto/"+id,{method:"DELETE"}).then(()=>load());
}

function st(id,s){
fetch("/admin/pedido/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status:s})
}).then(()=>load());
}

</script>

</body>
</html>
