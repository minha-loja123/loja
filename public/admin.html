<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }

    .box {
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      margin:auto;
    }

    input, button {
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    .item {
      background:white;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
    }

    button {
      cursor:pointer;
    }

    .hidden { display:none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
  <h2>🔐 Login Admin</h2>

  <input id="user" placeholder="Usuário">
  <input id="pass" type="password" placeholder="Senha">

  <button onclick="login()">Entrar</button>
</div>

<!-- PAINEL -->
<div class="box hidden" id="adminBox">
  <h2>🔥 Admin Produtos</h2>

  <input id="nome" placeholder="Nome do produto">
  <input id="preco" placeholder="Preço">
  <input id="img" placeholder="URL da imagem">

  <button onclick="criar()">Cadastrar Produto</button>

  <div id="lista"></div>
</div>

<script>

let token = localStorage.getItem("token");

// se já estiver logado
if(token){
  loginBox.classList.add("hidden");
  adminBox.classList.remove("hidden");
  carregar();
}

// LOGIN
function login(){
  fetch("https://loja-cd3v.onrender.com/login", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      username: user.value,
      password: pass.value
    })
  })
  .then(r => r.json())
  .then(data => {
    if(data.token){
      localStorage.setItem("token", data.token);
      location.reload();
    } else {
      alert("Erro no login");
    }
  });
}

// CRIAR
function criar(){
  fetch("https://loja-cd3v.onrender.com/admin/produto", {
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      nome: nome.value,
      preco: Number(preco.value),
      img: img.value
    })
  })
  .then(() => carregar());
}

// LISTAR
function carregar(){
  fetch("https://loja-cd3v.onrender.com/produtos")
  .then(r => r.json())
  .then(data => {
    lista.innerHTML = "";

    data.forEach(p => {
      lista.innerHTML += `
        <div class="item">
          <b>${p.nome}</b> - R$ ${p.preco}
          <br><br>

          <button onclick="editar('${p._id}')">Editar</button>
          <button onclick="deletar('${p._id}')" style="background:red;color:white;">Deletar</button>
        </div>
      `;
    });
  });
}

// EDITAR
function editar(id){
  const novoNome = prompt("Novo nome:");
  const novoPreco = prompt("Novo preço:");
  const novaImg = prompt("Nova imagem:");

  fetch("https://loja-cd3v.onrender.com/admin/produto/" + id, {
    method:"PUT",
    headers:{
      "Content-Type":"application/json",
      "Authorization": token
    },
    body: JSON.stringify({
      nome: novoNome,
      preco: Number(novoPreco),
      img: novaImg
    })
  })
  .then(() => carregar());
}

// DELETAR
function deletar(id){
  fetch("https://loja-cd3v.onrender.com/admin/produto/" + id, {
    method:"DELETE",
    headers:{
      "Authorization": token
    }
  })
  .then(() => carregar());
}

</script>

</body>
</html>
