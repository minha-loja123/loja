<!DOCTYPE html>
<html>
<head>
<title>Admin Pro 3</title>

<style>
body{font-family:Arial;background:#eee;padding:20px}
.box{background:#fff;padding:15px;max-width:500px;margin:auto}
input,button{width:100%;padding:10px;margin:5px 0}
</style>

</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="user">
<input id="pass" type="password">
<button onclick="login()">Entrar</button>

<hr>

<h2>Produto</h2>

<input id="nome">
<input id="preco">
<input id="img">
<input id="cat">

<button onclick="create()">Criar</button>

<div id="lista"></div>

</div>

<script>

let token = localStorage.getItem("token");

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user.value,password:pass.value})
})
.then(r=>r.json())
.then(d=>{
if(d.token){
token=d.token;
localStorage.setItem("token",token);
load();
}
});
}

function create(){
fetch("/admin/produto",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({
nome:nome.value,
preco:Number(preco.value),
img:img.value,
categoria:cat.value
})
})
.then(()=>load());
}

function load(){
fetch("/produtos")
.then(r=>r.json())
.then(d=>{
lista.innerHTML="";
d.forEach(p=>{
lista.innerHTML+=`<p>${p.nome}</p>`;
});
});
}

load();

</script>

</body>
</html>
