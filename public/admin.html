<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body>

<h2>Login</h2>
<input id="u">
<input id="p" type="password">
<button onclick="login()">Entrar</button>

<hr>

<h2>Produto</h2>

<input id="n">
<input id="pr">
<input id="i">
<input id="c">

<button onclick="add()">Criar</button>

<div id="list"></div>

<script>

let token="";

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.json())
.then(d=>{
token=d.token;
load();
});
}

function add(){
fetch("/admin/produto",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({
nome:n.value,
preco:pr.value,
img:i.value,
categoria:c.value
})
})
.then(()=>load());
}

function load(){
fetch("/produtos")
.then(r=>r.json())
.then(d=>{
list.innerHTML="";
d.forEach(p=>{
list.innerHTML+=`<p>${p.nome}</p>`;
});
});
}

load();

</script>

</body>
</html>
