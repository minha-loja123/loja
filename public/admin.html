<!DOCTYPE html>
<html>
<head>
  <title>Admin</title>
</head>

<body>

<h2>Admin Produtos</h2>

<input id="nome" placeholder="Nome"><br><br>
<input id="preco" placeholder="Preço"><br><br>
<input id="img" placeholder="Imagem (URL)"><br><br>

<button onclick="criar()">Criar</button>

<div id="lista"></div>

<script>

function criar(){
  fetch("https://loja-cd3v.onrender.com/admin/produto", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      nome: nome.value,
      preco: preco.value,
      img: img.value
    })
  })
  .then(() => carregar());
}

function carregar(){
  fetch("https://loja-cd3v.onrender.com/produtos")
  .then(r => r.json())
  .then(data => {
    lista.innerHTML = "";

    data.forEach(p => {
      lista.innerHTML += `
        <div>
          ${p.nome} - R$ ${p.preco}
        </div>
      `;
    });
  });
}

carregar();

</script>

</body>
</html>
