<!DOCTYPE html>
<html>
<head>
  <title>Painel Admin</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; padding:20px; }

    .box {
      background:white;
      padding:20px;
      border-radius:10px;
      max-width:500px;
      margin:auto;
    }

    input, button {
      width:100%;
      padding:10px;
      margin:5px 0;
    }

    .item {
      background:white;
      padding:10px;
      margin-top:10px;
      border-radius:8px;
    }

    button {
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>🔥 Admin Produtos</h2>

  <input id="nome" placeholder="Nome do produto">
  <input id="preco" placeholder="Preço">
  <input id="img" placeholder="URL da imagem">

  <button onclick="criar()">Cadastrar Produto</button>

  <div id="lista"></div>
</div>

<script>

function criar(){
  fetch("https://loja-cd3v.onrender.com/admin/produto", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      nome: nome.value,
      preco: preco.value,
      img: img.value
    })
  })
  .then(() => carregar());
}

function carregar(){
  fetch("https://loja-cd3v.onrender.com/produtos")
  .then(r => r.json())
  .then(data => {
    lista.innerHTML = "";

    data.forEach(p => {
      lista.innerHTML += `
        <div class="item">
          <b>${p.nome}</b> - R$ ${p.preco}
          <br><br>

          <button onclick="editar('${p._id}')">Editar</button>
          <button onclick="deletar('${p._id}')" style="background:red;color:white;">Deletar</button>
        </div>
      `;
    });
  });
}

function editar(id){
  const nome = prompt("Novo nome:");
  const preco = prompt("Novo preço:");
  const img = prompt("Nova imagem (URL):");

  fetch("https://loja-cd3v.onrender.com/admin/produto/" + id, {
    method:"PUT",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ nome, preco, img })
  })
  .then(() => carregar());
}

function deletar(id){
  fetch("https://loja-cd3v.onrender.com/admin/produto/" + id, {
    method:"DELETE"
  })
  .then(() => carregar());
}

carregar();

</script>

</body>
</html>
