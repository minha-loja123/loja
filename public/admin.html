<!DOCTYPE html>
<html>
<head>
<title>Painel Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:#0f0f14;
color:#fff;
padding:20px;
margin:0;
}

/* TÍTULO */
h2{
text-align:center;
}

/* FORM */
.form{
background:#1a1a22;
padding:15px;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border:none;
border-radius:6px;
background:#2a2a35;
color:#fff;
}

/* BOTÕES */
button{
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.criar{
background:#00a650;
color:#fff;
width:100%;
}

.refresh{
background:#444;
color:#fff;
width:100%;
margin-top:5px;
}

/* LISTA */
.item{
background:#1a1a22;
padding:10px;
margin:10px 0;
border-radius:10px;
display:flex;
align-items:center;
justify-content:space-between;
}

.item img{
width:60px;
height:60px;
object-fit:contain;
margin-right:10px;
}

.info{
flex:1;
}

.nome{
font-weight:bold;
}

.preco{
color:#ff3c00;
}

/* BOTÃO EXCLUIR */
.excluir{
background:red;
color:#fff;
padding:8px;
}

/* STATUS */
.status{
text-align:center;
margin-bottom:10px;
color:#00ff88;
}
</style>
</head>

<body>

<h2>🔥 Painel Admin</h2>

<div class="form">
<input id="nome" placeholder="Nome do produto">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="Imagem (ex: /img/pod.jpg)">

<button class="criar" onclick="criar()">➕ Criar Produto</button>
<button class="refresh" onclick="carregar()">🔄 Atualizar Lista</button>
</div>

<div class="status" id="status"></div>

<div id="lista"></div>

<script>

/* LISTAR */
function carregar(){
fetch("/produtos")
.then(r=>r.json())
.then(produtos=>{

const div=document.getElementById("lista");
div.innerHTML="";

produtos.forEach(p=>{

const item=document.createElement("div");
item.className="item";

item.innerHTML = `
<img src="${p.img}">

<div class="info">
<div class="nome">${p.nome}</div>
<div class="preco">R$ ${p.preco}</div>
</div>

<button class="excluir" onclick="deletar('${p._id}')">
Excluir
</button>
`;

div.appendChild(item);

});

});
}

/* CRIAR */
function criar(){

const nome = document.getElementById("nome").value;
const preco = document.getElementById("preco").value;
const img = document.getElementById("img").value;

if(!nome || !preco || !img){
return alert("Preencha tudo");
}

fetch("/produtos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nome,
preco:Number(preco),
img
})
})
.then(()=>{
document.getElementById("status").innerText="✅ Produto criado!";
document.getElementById("nome").value="";
document.getElementById("preco").value="";
document.getElementById("img").value="";
carregar();
});
}

/* DELETAR */
function deletar(id){

if(!confirm("Tem certeza que deseja excluir?")) return;

fetch("/produtos/"+id,{
method:"DELETE"
})
.then(()=>{
document.getElementById("status").innerText="🗑️ Produto removido!";
carregar();
})
.catch(()=>{
alert("Erro ao deletar");
});
}

/* INIT */
carregar();

</script>

</body>
</html>
