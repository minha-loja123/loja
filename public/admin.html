<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
</head>

<body>

<h2>Login</h2>
<input id="u">
<input id="p">
<button onclick="login()">Entrar</button>

<hr>

<h2>Produto</h2>
<input id="n">
<input id="pr">
<input id="i">
<input id="c">
<button onclick="add()">Criar</button>

<hr>

<h2>Pedidos</h2>
<div id="pedidos"></div>

<script>

function login(){
alert("login simples (sem token nesta versão)");
}

function add(){
fetch("/admin/produto",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nome:n.value,
preco:pr.value,
img:i.value,
categoria:c.value
})
}).then(()=>alert("criado"));
}

fetch("/admin/pedidos")
.then(r=>r.json())
.then(d=>{
pedidos.innerHTML="";

d.forEach(p=>{
pedidos.innerHTML+=`
<div>
<p>Total: ${p.total}</p>
<p>Status: ${p.status}</p>

<button onclick="status('${p._id}','enviado')">Enviar</button>
<button onclick="status('${p._id}','entregue')">Entregue</button>
</div>`;
});
});

function status(id,s){
fetch("/admin/pedido/"+id,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status:s})
}).then(()=>location.reload());
}

</script>

</body>
</html>
