<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.box{background:#fff;padding:15px;border-radius:10px;max-width:500px;margin:auto}
input,button{width:100%;padding:10px;margin:5px 0}
.item{background:#eee;padding:10px;margin-top:10px}
</style>
</head>

<body>

<div class="box">

<h2>Login</h2>

<input id="user" placeholder="user">
<input id="pass" type="password" placeholder="senha">
<button onclick="login()">Entrar</button>

<hr>

<h2>Produto</h2>

<input id="nome" placeholder="nome">
<input id="preco" placeholder="preço">
<input id="img" placeholder="img /img/arquivo.jpg">
<input id="cat" placeholder="categoria">

<button onclick="criar()">Criar</button>

<div id="lista"></div>

</div>

<script>

let token = localStorage.getItem("token");

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:user.value,password:pass.value})
})
.then(r=>r.json())
.then(d=>{
if(d.token){
localStorage.setItem("token",d.token);
token=d.token;
carregar();
}
});
}

function criar(){
fetch("/admin/produto",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({
nome:nome.value,
preco:Number(preco.value),
img:img.value,
categoria:cat.value
})
})
.then(()=>carregar());
}

function carregar(){
fetch("/produtos")
.then(r=>r.json())
.then(d=>{
lista.innerHTML="";
d.forEach(p=>{
lista.innerHTML+=`
<div class="item">
${p.nome} - R$${p.preco}
<button onclick="del('${p._id}')">X</button>
</div>
`
});
});
}

function del(id){
fetch("/admin/produto/"+id,{
method:"DELETE",
headers:{Authorization:token}
}).then(()=>carregar());
}

carregar();

</script>

</body>
</html>
