<!DOCTYPE html>
<html>
<head>
<title>Admin Shopee</title>
</head>

<body>

<h2>Login</h2>
<input id="u">
<input id="p">
<button onclick="login()">Entrar</button>

<hr>

<h2>Pedidos</h2>
<div id="pedidos"></div>

<script>

let token="";

function login(){
fetch("/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username:u.value,password:p.value})
})
.then(r=>r.json())
.then(d=>{
token=d.token;
loadPedidos();
});
}

function loadPedidos(){
fetch("/admin/pedidos",{headers:{Authorization:token}})
.then(r=>r.json())
.then(d=>{
pedidos.innerHTML="";

d.forEach(p=>{
pedidos.innerHTML+=`
<div>
<p>Total: ${p.total}</p>
<p>Status: ${p.status}</p>

<button onclick="update('${p._id}','pendente')">Pendente</button>
<button onclick="update('${p._id}','enviado')">Enviado</button>
<button onclick="update('${p._id}','entregue')">Entregue</button>

<hr>
</div>
`;
});
});
}

function update(id,status){
fetch("/admin/pedido/"+id,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"Authorization":token
},
body:JSON.stringify({status})
})
.then(()=>loadPedidos());
}

</script>

</body>
</html>
