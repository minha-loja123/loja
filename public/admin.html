<!DOCTYPE html>
<html>
<head>
<title>Admin</title>

<style>
body{font-family:Arial;background:#f2f2f2;padding:20px}

input{
padding:8px;
margin:5px;
}

button{
padding:8px;
background:#ee4d2d;
color:#fff;
border:none;
cursor:pointer;
}

.item{
background:#fff;
padding:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
align-items:center;
border-radius:8px;
}

.excluir{
background:red;
}
</style>
</head>

<body>

<h2>Admin - Produtos</h2>

<input id="nome" placeholder="Nome">
<input id="preco" placeholder="Preço">
<input id="img" placeholder="Imagem (ex: /img/pod.jpg)">

<button onclick="criar()">Criar Produto</button>

<hr>

<div id="lista"></div>

<script>

/* LISTAR */
function carregar(){
fetch("/produtos")
.then(r=>r.json())
.then(produtos=>{

const div=document.getElementById("lista");
div.innerHTML="";

produtos.forEach(p=>{

const item=document.createElement("div");
item.className="item";

const info=document.createElement("span");
info.innerText = p.nome + " - R$ " + p.preco;

const btn=document.createElement("button");
btn.innerText="Excluir";
btn.className="excluir";

btn.onclick = () => deletar(p._id);

item.appendChild(info);
item.appendChild(btn);

div.appendChild(item);

});

});
}

/* CRIAR */
function criar(){
fetch("/produtos",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
nome:document.getElementById("nome").value,
preco:Number(document.getElementById("preco").value),
img:document.getElementById("img").value
})
})
.then(()=>carregar());
}

/* DELETAR */
function deletar(id){

if(!confirm("Excluir produto?")) return;

fetch("/produtos/"+id,{
method:"DELETE"
})
.then(res=>res.json())
.then(data=>{
console.log(data);
alert(data.mensagem || "Erro");
carregar();
})
.catch(err=>{
console.error(err);
alert("Erro ao deletar");
});

}

/* INIT */
carregar();

</script>

</body>
</html>
