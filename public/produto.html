<!DOCTYPE html>
<html>
<head>
<title>Produto</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{font-family:Arial;background:#f5f5f5;padding:10px}
.card{background:#fff;padding:15px;border-radius:10px}
img{width:100%;height:200px;object-fit:contain}
button{width:100%;padding:12px;background:#00a650;color:#fff;border:none;margin-top:10px}
</style>
</head>

<body>

<div class="card" id="produto"></div>

<script>
let p = JSON.parse(localStorage.getItem("produtoAtual"));

document.getElementById("produto").innerHTML=`
<img src="${p.img}">
<h2>${p.nome}</h2>
<p>Preço: R$ ${p.preco}</p>
<button onclick='add(${JSON.stringify(p)})'>Adicionar ao carrinho</button>
`;

function add(p){
let c = JSON.parse(localStorage.getItem("carrinho"))||[];
c.push(p);
localStorage.setItem("carrinho", JSON.stringify(c));
alert("Adicionado!");
}
</script>

</body>
</html>
