<!DOCTYPE html>
<html>
<head>
<title>Produto</title>
<meta name="viewport" content="width=device-width">

<style>
body{background:#0f0f14;color:#fff;font-family:Arial;padding:10px}

.card{
background:#1a1a22;
padding:15px;
border-radius:10px;
}

img{width:100%;height:200px;object-fit:contain}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.add{background:#00a650;color:#fff}
.voltar{background:#444;color:#fff}
</style>
</head>

<body>

<div class="card" id="produto"></div>

<script>
let p = JSON.parse(localStorage.getItem("produtoAtual"));

document.getElementById("produto").innerHTML=`
<img src="${p.img}">
<h2>${p.nome}</h2>
<p>R$ ${p.preco}</p>

<button class="add" onclick='add(${JSON.stringify(p)})'>Adicionar ao carrinho</button>
<button class="voltar" onclick="history.back()">Voltar</button>
`;

function add(p){
let c = JSON.parse(localStorage.getItem("carrinho"))||[];
c.push(p);
localStorage.setItem("carrinho", JSON.stringify(c));
alert("Adicionado!");
}
</script>

</body>
</html>
