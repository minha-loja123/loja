<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:#fff;
}

/* HEADER */
header{
background:#1a1a22;
padding:15px;
text-align:center;
position:sticky;
top:0;
}

.carrinho{
position:absolute;
right:15px;
top:15px;
background:#00a650;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
}

/* HERO */
.hero{
background:linear-gradient(120deg,#ff3c00,#ff7b00);
padding:30px;
text-align:center;
}

/* CONFIANÇA */
.trust{
display:flex;
justify-content:space-around;
font-size:12px;
background:#1a1a22;
padding:10px;
}

/* LISTA (1 COLUNA) */
#lista{
display:flex;
flex-direction:column;
padding:10px;
gap:15px;
}

/* CARD PRODUTO */
.produto{
background:#1a1a22;
border-radius:12px;
padding:12px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* IMAGEM GRANDE */
.produto img{
width:100%;
height:180px;
object-fit:contain;
margin-bottom:10px;
}

/* TEXTO */
.nome{
font-size:16px;
font-weight:bold;
}

.preco{
font-size:18px;
color:#00ff9d;
margin:5px 0;
}

.vendidos{
font-size:12px;
color:#aaa;
}

/* BOTÕES */
.btn{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.ver{
background:#333;
color:#fff;
}

.comprar{
background:linear-gradient(120deg,#00c853,#00a650);
color:#fff;
}

/* POPUP */
.popup{
position:fixed;
bottom:20px;
left:20px;
background:#1a1a22;
padding:10px;
border-radius:10px;
display:none;
font-size:12px;
}
</style>
</head>

<body>

<header>
🔥 Vape Store SP
<div class="carrinho" onclick="irCarrinho()">🛒 <span id="count">0</span></div>
</header>

<div class="hero">
<h2>🔥 Promoções do dia</h2>
<p>Entrega rápida • Qualidade premium</p>
</div>

<div class="trust">
<span>🚚 Rápido</span>
<span>🔒 Seguro</span>
<span>⭐ 4.9</span>
</div>

<div id="lista"></div>

<div class="popup" id="popup"></div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];
document.getElementById("count").innerText = carrinho.length;

let produtos=[];

fetch("/produtos").then(r=>r.json()).then(d=>{
produtos=d;
mostrar(d);
});

function mostrar(lista){
document.getElementById("lista").innerHTML="";

lista.forEach(p=>{

const vendidos = Math.floor(Math.random()*200)+50;

document.getElementById("lista").innerHTML+=`
<div class="produto">
<img src="${p.img}">

<div class="nome">${p.nome}</div>
<div class="vendidos">🔥 ${vendidos} vendidos hoje</div>
<div class="preco">R$ ${p.preco}</div>

<button class="btn ver" onclick='verProduto(${JSON.stringify(p)})'>
Ver detalhes
</button>

<button class="btn comprar" onclick='addCarrinho(${JSON.stringify(p)})'>
🔥 Comprar agora
</button>

</div>
`;

});
}

function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
document.getElementById("count").innerText = carrinho.length;
mostrarPopup("Adicionado ao carrinho 🔥");
}

function verProduto(p){
localStorage.setItem("produtoAtual", JSON.stringify(p));
location.href="produto.html";
}

function irCarrinho(){
location.href="checkout.html";
}

/* POPUP */
function mostrarPopup(msg){
const popup=document.getElementById("popup");
popup.innerText=msg;
popup.style.display="block";
setTimeout(()=>popup.style.display="none",3000);
}

/* SOCIAL */
setInterval(()=>{
const nomes=["Lucas","Ana","Pedro","Julia"];
const prods=["Elfbar","Ignite","Oxbar"];

mostrarPopup(nomes[Math.floor(Math.random()*nomes.length)]+" comprou "+prods[Math.floor(Math.random()*prods.length)]);
},20000);

</script>

</body>
</html>
