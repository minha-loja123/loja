<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:#fff;
}

/* HEADER */
header{
background:#1a1a22;
padding:15px;
text-align:center;
position:sticky;
top:0;
z-index:10;
}

.carrinho{
position:absolute;
right:15px;
top:15px;
background:#00a650;
padding:6px 12px;
border-radius:20px;
cursor:pointer;
}

/* HERO */
.hero{
background:linear-gradient(120deg,#ff3c00,#ff7b00);
padding:30px;
text-align:center;
}

/* BUSCA */
#busca{
width:90%;
margin:10px auto;
display:block;
padding:12px;
border-radius:25px;
border:none;
}

/* CATEGORIAS */
.menu{
display:flex;
gap:10px;
overflow:auto;
padding:10px;
}

.menu button{
border:none;
padding:8px 14px;
border-radius:20px;
background:#333;
color:#fff;
cursor:pointer;
}

/* PRODUTOS */
#lista{
display:flex;
flex-direction:column;
padding:10px;
gap:15px;
}

.produto{
background:#1a1a22;
border-radius:12px;
padding:12px;
}

.produto img{
width:100%;
height:180px;
object-fit:contain;
}

.nome{font-size:16px;font-weight:bold;}
.preco{color:#00ff9d;font-size:18px;margin:5px 0;}
.vendidos{font-size:12px;color:#aaa;}

/* BOTÕES */
.btn{
width:100%;
padding:12px;
margin-top:6px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.ver{background:#333;color:#fff;}
.comprar{background:#00a650;color:#fff;}

</style>
</head>

<body>

<header>
🔥 Vape Store SP
<div class="carrinho" onclick="irCarrinho()">🛒 <span id="count">0</span></div>
</header>

<div class="hero">
<h2>🔥 Ofertas do dia</h2>
<p>Entrega rápida • Produtos premium</p>
</div>

<input id="busca" placeholder="Buscar produtos..." onkeyup="buscar()">

<div class="menu">
<button onclick="filtrar('todos')">Todos</button>
<button onclick="filtrar('pods')">Pods</button>
<button onclick="filtrar('essencias')">Essências</button>
<button onclick="filtrar('acessorios')">Acessórios</button>
</div>

<div id="lista"></div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];
document.getElementById("count").innerText = carrinho.length;

let produtos=[];

fetch("/produtos").then(r=>r.json()).then(d=>{
produtos=d;
mostrar(d);
});

/* MOSTRAR */
function mostrar(lista){
document.getElementById("lista").innerHTML="";

lista.forEach(p=>{

const vendidos = Math.floor(Math.random()*200)+50;

document.getElementById("lista").innerHTML+=`
<div class="produto">
<img src="${p.img}">
<div class="nome">${p.nome}</div>
<div class="vendidos">🔥 ${vendidos} vendidos hoje</div>
<div class="preco">R$ ${p.preco}</div>

<button class="btn ver" onclick='verProduto(${JSON.stringify(p)})'>Ver detalhes</button>
<button class="btn comprar" onclick='addCarrinho(${JSON.stringify(p)})'>Comprar agora</button>
</div>
`;
});
}

/* BUSCA */
function buscar(){
const termo = document.getElementById("busca").value.toLowerCase();
const filtrado = produtos.filter(p=>p.nome.toLowerCase().includes(termo));
mostrar(filtrado);
}

/* FILTRO */
function filtrar(tipo){

if(tipo==="todos") return mostrar(produtos);

if(tipo==="pods"){
return mostrar(produtos.filter(p=>p.nome.toLowerCase().includes("k")||p.nome.toLowerCase().includes("elf")));
}

if(tipo==="essencias"){
return mostrar(produtos.filter(p=>p.nome.toLowerCase().includes("essencia")));
}

if(tipo==="acessorios"){
return mostrar(produtos.filter(p=>p.nome.toLowerCase().includes("coil")));
}

}

/* CARRINHO */
function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
document.getElementById("count").innerText = carrinho.length;
alert("Adicionado ao carrinho");
}

function verProduto(p){
localStorage.setItem("produtoAtual", JSON.stringify(p));
location.href="produto.html";
}

function irCarrinho(){
location.href="checkout.html";
}

</script>

</body>
</html>
