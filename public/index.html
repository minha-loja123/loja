<!DOCTYPE html>
<html>
<head>
<title>Loja Pro</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
header{
background:#ee4d2d;
color:#fff;
padding:12px;
text-align:center;
font-size:18px;
}

/* SEARCH */
.search{
padding:10px;
background:#fff;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
outline:none;
}

/* CATEGORIES */
.tabs{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
background:#fff;
}

.tab{
background:#eee;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

button{
background:#ee4d2d;
color:#fff;
border:none;
padding:8px;
border-radius:6px;
width:100%;
cursor:pointer;
margin-top:5px;
}

/* CART */
.cart{
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
margin:8px 0;
}

.smallbtn{
background:#ddd;
color:#000;
border:none;
padding:4px 8px;
border-radius:5px;
cursor:pointer;
}

.total{
font-weight:bold;
margin-top:10px;
}
</style>

</head>

<body>

<header>🛒 Minha Loja PRO</header>

<!-- SEARCH -->
<div class="search">
<input id="busca" placeholder="Buscar produtos..." onkeyup="search()">
</div>

<!-- CATEGORIES -->
<div class="tabs" id="tabs"></div>

<!-- PRODUCTS -->
<div class="grid" id="produtos"></div>

<!-- CART -->
<div class="cart">
<h3>Carrinho</h3>
<div id="cart"></div>
<div class="total" id="total">Total: R$ 0</div>
<button onclick="finalizar()">Finalizar no WhatsApp</button>
</div>

<script>

let produtos = [];
let carrinho = [];

fetch("/produtos")
.then(r=>r.json())
.then(d=>{
produtos = d;
render(d);
renderTabs(d);
});

/* PRODUCTS */
function render(data){
const div=document.getElementById("produtos");
div.innerHTML="";

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>

<button onclick="add('${p.nome}',${p.preco})">Comprar</button>

</div>`;
});
}

/* SEARCH */
function search(){
let t=document.getElementById("busca").value.toLowerCase();

render(produtos.filter(p=>p.nome.toLowerCase().includes(t)));
}

/* CATEGORIES */
function renderTabs(data){
const cats=[...new Set(data.filter(p=>p.categoria).map(p=>p.categoria))];

document.getElementById("tabs").innerHTML=
`<div class="tab" onclick="render(produtos)">Todos</div>`+
cats.map(c=>`
<div class="tab" onclick="filter('${c}')">${c}</div>
`).join("");
}

function filter(cat){
render(produtos.filter(p=>p.categoria===cat));
}

/* CART */
function add(nome,preco){
let item=carrinho.find(i=>i.nome===nome);

if(item) item.qtd++;
else carrinho.push({nome,preco,qtd:1});

renderCart();
}

function renderCart(){
let div=document.getElementById("cart");
div.innerHTML="";

let total=0;

carrinho.forEach(i=>{
div.innerHTML+=`
<div class="item">
<span>${i.nome} x${i.qtd}</span>

<div>
<button class="smallbtn" onclick="menos('${i.nome}')">-</button>
<button class="smallbtn" onclick="mais('${i.nome}')">+</button>
<button class="smallbtn" onclick="remover('${i.nome}')">x</button>
</div>

</div>`;

total+=i.preco*i.qtd;
});

document.getElementById("total").innerText="Total: R$ "+total;
}

function mais(nome){
let i=carrinho.find(i=>i.nome===nome);
i.qtd++;
renderCart();
}

function menos(nome){
let i=carrinho.find(i=>i.nome===nome);
i.qtd--;

if(i.qtd<=0){
carrinho=carrinho.filter(p=>p.nome!==nome);
}

renderCart();
}

function remover(nome){
carrinho=carrinho.filter(p=>p.nome!==nome);
renderCart();
}

/* FINALIZAR */
function finalizar(){
let msg="Pedido:%0A";
let total=0;

carrinho.forEach(i=>{
msg+=`${i.nome} x${i.qtd}%0A`;
total+=i.preco*i.qtd;
});

msg+=`%0ATotal: R$ ${total}`;

window.open("https://wa.me/5599999999999?text="+msg);
}

</script>

</body>
</html>
