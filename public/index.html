<!DOCTYPE html>
<html>
<head>
<title>App Loja</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER APP */
header{
background:#ee4d2d;
color:#fff;
padding:15px;
text-align:center;
font-size:18px;
}

/* CATEGORIAS */
.tabs{
display:flex;
overflow:auto;
background:#fff;
padding:10px;
gap:10px;
}

.tab{
padding:8px 12px;
background:#eee;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

/* PRODUTOS */
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
border-radius:10px;
padding:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

button{
width:100%;
padding:8px;
border:none;
border-radius:6px;
background:#ee4d2d;
color:#fff;
}
</style>

</head>

<body>

<header>🛒 Minha Loja App</header>

<div class="tabs" id="tabs"></div>

<div class="grid" id="produtos"></div>

<script>

let produtos = [];

fetch("/produtos")
.then(r=>r.json())
.then(d=>{
produtos = d;
render(d);
renderTabs(d);
});

function render(data){
const div=document.getElementById("produtos");
div.innerHTML="";

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button onclick="buy('${p.nome}',${p.preco})">Comprar</button>
</div>`;
});
}

/* categorias estilo app */
function renderTabs(data){
const cats=[...new Set(data.map(p=>p.categoria))];

document.getElementById("tabs").innerHTML=
`<div class="tab" onclick="render(produtos)">Todos</div>`+
cats.map(c=>`
<div class="tab" onclick="filter('${c}')">${c}</div>
`).join("");
}

function filter(cat){
render(produtos.filter(p=>p.categoria===cat));
}

/* checkout */
function buy(nome,preco){
window.open("https://wa.me/5599999999999?text=Quero "+nome);
}

</script>

</body>
</html>
