<!DOCTYPE html>
<html>
<head>
  <title>Minha Loja</title>

  <style>
    body { font-family: Arial; background:#f5f5f5; margin:0; }

    h1 { 
      background:#ee4d2d; 
      color:#fff; 
      padding:20px; 
      text-align:center; 
      margin:0;
    }

    .topo {
      padding: 10px;
      text-align: center;
      background: white;
    }

    .topo input {
      width: 80%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .container { max-width:900px; margin:auto; padding:20px; }

    #produtos {
      display:grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap:15px;
    }

    .card {
      background:white;
      padding:10px;
      border-radius:10px;
      text-align:center;
      box-shadow:0 3px 10px rgba(0,0,0,0.1);
    }

    img { width:100%; border-radius:10px; }

    button {
      background:#ee4d2d;
      color:#fff;
      border:none;
      padding:8px;
      border-radius:8px;
      cursor:pointer;
    }

    #carrinho {
      background:white;
      padding:10px;
      margin-top:20px;
      border-radius:10px;
    }
  </style>
</head>

<body>

<h1>🛒 Minha Loja</h1>

<div class="topo">
  <input id="busca" placeholder="Buscar produto..." onkeyup="filtrar()">
</div>

<div class="container">

  <div id="produtos"></div>

  <h2>Carrinho</h2>
  <div id="carrinho"></div>

  <h3 id="total">Total: R$ 0</h3>

  <button onclick="finalizar()">Finalizar Compra</button>

</div>

<script>

let carrinho = [];
let listaProdutos = [];

fetch("https://loja-cd3v.onrender.com/produtos")
.then(r => r.json())
.then(data => {
  listaProdutos = data;
  mostrar(data);
});

function mostrar(data){
  const div = document.getElementById("produtos");
  div.innerHTML = "";

  data.forEach(p => {
    div.innerHTML += `
      <div class="card">
        <img src="${p.img || 'https://via.placeholder.com/150'}">
        <h3>${p.nome}</h3>
        <p>R$ ${p.preco}</p>
        <button onclick="add('${p.nome}', ${p.preco})">Comprar</button>
      </div>
    `;
  });
}

function filtrar(){
  const termo = document.getElementById("busca").value.toLowerCase();
  const filtrados = listaProdutos.filter(p => p.nome.toLowerCase().includes(termo));
  mostrar(filtrados);
}

function add(nome, preco){
  const item = carrinho.find(i => i.nome === nome);

  if(item){
    item.qtd++;
  } else {
    carrinho.push({nome, preco, qtd:1});
  }

  render();
}

function render(){
  let div = document.getElementById("carrinho");
  div.innerHTML = "";

  let total = 0;

  carrinho.forEach(i => {
    div.innerHTML += `
      <p>${i.nome} - R$ ${i.preco} 
      <button onclick="menos('${i.nome}')">-</button>
      ${i.qtd}
      <button onclick="mais('${i.nome}')">+</button>
      </p>
    `;
    total += i.preco * i.qtd;
  });

  document.getElementById("total").innerText = "Total: R$ " + total;
}

function mais(nome){
  const item = carrinho.find(i => i.nome === nome);
  item.qtd++;
  render();
}

function menos(nome){
  const item = carrinho.find(i => i.nome === nome);
  item.qtd--;

  if(item.qtd <= 0){
    carrinho = carrinho.filter(i => i.nome !== nome);
  }

  render();
}

function finalizar(){
  let total = 0;
  carrinho.forEach(i => total += i.preco * i.qtd);

  fetch("https://loja-cd3v.onrender.com/pedido", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      carrinho,
      total
    })
  })
  .then(r => r.json())
  .then(data => {
    alert(data.mensagem);
    carrinho = [];
    render();
  });
}

</script>

</body>
</html>
