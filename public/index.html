<!DOCTYPE html>
<html>
<head>
<title>Shopee Max</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

header{
background:#ee4d2d;
color:#fff;
padding:15px;
text-align:center;
font-size:18px;
}

.search{
padding:10px;
background:#fff;
}

.search input{
width:100%;
padding:10px;
border-radius:8px;
border:1px solid #ddd;
}

.tabs{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
background:#fff;
}

.tab{
background:#eee;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

button{
background:#ee4d2d;
color:#fff;
border:none;
padding:8px;
border-radius:6px;
width:100%;
}

.cart{
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
}

.item{
display:flex;
justify-content:space-between;
margin:6px 0;
}

.small{
background:#ddd;
border:none;
padding:4px 6px;
border-radius:5px;
}

.total{
font-weight:bold;
margin-top:10px;
}
</style>

</head>

<body>

<header>🛒 SHOPEE MAX LOJA</header>

<div class="search">
<input id="busca" placeholder="Buscar..." onkeyup="search()">
</div>

<div class="tabs" id="tabs"></div>

<div class="grid" id="produtos"></div>

<div class="cart">
<h3>Carrinho</h3>
<div id="cart"></div>
<div class="total" id="total"></div>
<button onclick="finalizar()">Finalizar WhatsApp</button>
</div>

<script>

let produtos=[];
let carrinho=JSON.parse(localStorage.getItem("cart"))||[];

fetch("/produtos")
.then(r=>r.json())
.then(d=>{
produtos=d;
render(d);
tabs(d);
cart();
});

/* PRODUTOS */
function render(data){
let div=document.getElementById("produtos");
div.innerHTML="";

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button onclick="add('${p.nome}',${p.preco})">Comprar</button>
</div>`;
});
}

/* SEARCH */
function search(){
let t=busca.value.toLowerCase();
render(produtos.filter(p=>p.nome.toLowerCase().includes(t)));
}

/* CATEGORIES */
function tabs(data){
let c=[...new Set(data.filter(p=>p.categoria).map(p=>p.categoria))];

tabs.innerHTML=
`<div class="tab" onclick="render(produtos)">Todos</div>`+
c.map(x=>`<div class="tab" onclick="filtrar('${x}')">${x}</div>`).join("");
}

function filtrar(c){
render(produtos.filter(p=>p.categoria===c));
}

/* CART */
function add(n,p){
let i=carrinho.find(x=>x.nome===n);
if(i)i.qtd++;
else carrinho.push({nome:n,preco:p,qtd:1});
save();cart();
}

function cart(){
let d=document.getElementById("cart");
d.innerHTML="";
let t=0;

carrinho.forEach(i=>{
d.innerHTML+=`
<div class="item">
${i.nome} x${i.qtd}
<div>
<button class="small" onclick="m('${i.nome}')">-</button>
<button class="small" onclick="p('${i.nome}')">+</button>
<button class="small" onclick="r('${i.nome}')">x</button>
</div>
</div>`;
t+=i.preco*i.qtd;
});

total.innerText="Total: R$ "+t;
save();
}

function m(n){
let i=carrinho.find(x=>x.nome===n);
i.qtd--;
if(i.qtd<=0)carrinho=carrinho.filter(x=>x.nome!==n);
cart();
}

function p(n){
carrinho.find(x=>x.nome===n).qtd++;
cart();
}

function r(n){
carrinho=carrinho.filter(x=>x.nome!==n);
cart();
}

function save(){
localStorage.setItem("cart",JSON.stringify(carrinho));
}

/* FINAL */
function finalizar(){
let msg="Pedido:%0A";
let t=0;

carrinho.forEach(i=>{
msg+=`${i.nome} x${i.qtd}%0A`;
t+=i.preco*i.qtd;
});

msg+=`%0ATotal: R$ ${t}`;

window.open("https://wa.me/5599999999999?text="+msg);
}

</script>

</body>
</html>
