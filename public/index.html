<!DOCTYPE html>
<html>
<head>
<title>Loja Pro</title>

<style>
body{font-family:Arial;background:#f2f2f2;margin:0}

.banner img{width:100%;max-height:220px;object-fit:cover}

.container{max-width:1100px;margin:auto;padding:15px}

select{padding:10px;width:100%;margin:10px 0}

#produtos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}

.card{background:#fff;border-radius:10px;padding:10px;text-align:center}

.card img{width:100%;height:180px;object-fit:contain}

button{padding:8px;margin:5px;cursor:pointer;border:none;border-radius:5px}

.buy{background:#ee4d2d;color:#fff}
.whats{background:#25d366;color:#fff}

#carrinho{background:#fff;padding:10px;margin-top:20px;border-radius:10px}

.total{font-size:18px;font-weight:bold}
</style>

</head>

<body>

<div class="banner">
  <img src="/img/banner.jpg">
</div>

<div class="container">

<select id="filtro" onchange="filtrar()">
  <option value="todos">Todos</option>
  <option value="vape">Vape</option>
  <option value="acessorio">Acessório</option>
</select>

<div id="produtos"></div>

<h2>🛒 Carrinho</h2>
<div id="carrinho"></div>
<div class="total" id="total">Total: R$ 0</div>

<button onclick="finalizar()" style="width:100%;background:green;color:white;padding:10px">
Finalizar no WhatsApp
</button>

</div>

<script>

let lista = [];
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

async function load(){
  const res = await fetch("/produtos");
  lista = await res.json();
  render(lista);
  renderCart();
}

function render(data){
  const div = document.getElementById("produtos");
  div.innerHTML = "";

  data.forEach(p=>{
    div.innerHTML += `
      <div class="card">
        <img src="${p.img}" onerror="this.src='/img/coil.jpg'">
        <h3>${p.nome}</h3>
        <p>R$ ${p.preco}</p>

        <button class="buy" onclick="add('${p.nome}',${p.preco})">Comprar</button>
        <button class="whats" onclick="zap('${p.nome}')">WhatsApp</button>
      </div>
    `;
  });
}

function add(nome,preco){
  let item = carrinho.find(i=>i.nome===nome);

  if(item) item.qtd++;
  else carrinho.push({nome,preco,qtd:1});

  save();
  renderCart();
}

function renderCart(){
  const div = document.getElementById("carrinho");
  div.innerHTML = "";

  let total = 0;

  carrinho.forEach(i=>{
    div.innerHTML += `
      <p>
        ${i.nome} x${i.qtd}
        <button onclick="less('${i.nome}')">-</button>
        <button onclick="more('${i.nome}')">+</button>
      </p>
    `;

    total += i.preco*i.qtd;
  });

  document.getElementById("total").innerText = "Total: R$ " + total;
}

function more(nome){
  carrinho.find(i=>i.nome===nome).qtd++;
  save(); renderCart();
}

function less(nome){
  let item = carrinho.find(i=>i.nome===nome);
  item.qtd--;

  if(item.qtd<=0){
    carrinho = carrinho.filter(i=>i.nome!==nome);
  }

  save(); renderCart();
}

function save(){
  localStorage.setItem("carrinho",JSON.stringify(carrinho));
}

function filtrar(){
  const v = filtro.value;

  if(v==="todos") render(lista);
  else render(lista.filter(p=>p.categoria===v));
}

function zap(nome){
  window.open("https://wa.me/5599999999999?text=Quero: "+nome);
}

function finalizar(){
  let msg = "🛒 Pedido:%0A";
  let total = 0;

  carrinho.forEach(i=>{
    msg += `${i.nome} x${i.qtd} - R$ ${i.preco*i.qtd}%0A`;
    total += i.preco*i.qtd;
  });

  msg += "%0A💰 Total: R$ "+total;

  window.open("https://wa.me/5599999999999?text="+msg);
}

document.addEventListener("DOMContentLoaded",load);

</script>

</body>
</html>
