<!DOCTYPE html>
<html>
<head>
<title>Loja Shopee Real</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}

header{background:#ee4d2d;color:#fff;padding:15px;text-align:center}

.banner img{width:100%;height:220px;object-fit:cover}

.container{max-width:1100px;margin:auto;padding:15px}

.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}

.card{background:#fff;padding:10px;border-radius:10px;text-align:center}

.card img{width:100%;height:160px;object-fit:contain}

button{padding:8px;border:none;border-radius:6px;cursor:pointer}

.buy{background:#ee4d2d;color:#fff}

#cart{background:#fff;padding:10px;margin-top:20px;border-radius:10px}
</style>

</head>

<body>

<header>SHOPEE REAL MINI</header>

<div class="banner">
<img src="/img/banner.jpg">
</div>

<div class="container">

<div class="grid" id="produtos"></div>

<h2>Carrinho</h2>
<div id="cart"></div>

<h3 id="total">Total: 0</h3>

<button onclick="finalizar()" style="width:100%;background:green;color:#fff;padding:10px">
Finalizar WhatsApp
</button>

</div>

<script>

let carrinho = JSON.parse(localStorage.getItem("cart")) || [];

fetch("/produtos")
.then(r=>r.json())
.then(d=>{
render(d);
});

function render(data){
const div=document.getElementById("produtos");
div.innerHTML="";

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button class="buy" onclick="add('${p.nome}',${p.preco})">Comprar</button>
</div>`;
});
}

function add(nome,preco){
let item=carrinho.find(i=>i.nome===nome);

if(item) item.qtd++;
else carrinho.push({nome,preco,qtd:1});

save();
renderCart();
}

function renderCart(){
let div=document.getElementById("cart");
div.innerHTML="";

let total=0;

carrinho.forEach(i=>{
div.innerHTML+=`<p>${i.nome} x${i.qtd}</p>`;
total+=i.preco*i.qtd;
});

document.getElementById("total").innerText="Total: "+total;
}

function save(){
localStorage.setItem("cart",JSON.stringify(carrinho));
}

function finalizar(){
let msg="Pedido:%0A";
let total=0;

carrinho.forEach(i=>{
msg+=`${i.nome} x${i.qtd}%0A`;
total+=i.preco*i.qtd;
});

msg+=`%0ATotal: ${total}`;

window.open("https://wa.me/5599999999999?text="+msg);
}

renderCart();

</script>

</body>
</html>
