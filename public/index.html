<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

/* HEADER */
header{
background:#fff;
padding:15px;
text-align:center;
font-weight:bold;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #ddd;
}

.carrinho-topo{
position:absolute;
right:15px;
top:15px;
background:#00a650;
color:#fff;
padding:5px 10px;
border-radius:20px;
cursor:pointer;
}

/* BANNER */
.banner{
background:linear-gradient(90deg,#ff3c00,#ff7b00);
color:#fff;
text-align:center;
padding:20px;
font-weight:bold;
}

/* BUSCA */
#busca{
width:90%;
margin:10px auto;
display:block;
padding:12px;
border-radius:8px;
border:1px solid #ccc;
}

/* SEÇÕES */
.secao{
padding:10px;
}

.titulo-secao{
font-size:16px;
font-weight:bold;
margin:10px;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:10px;
}

/* PRODUTO */
.produto{
background:#fff;
border-radius:12px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
transition:0.2s;
}

.produto:hover{
transform:scale(1.02);
}

.produto img{
width:100%;
height:130px;
object-fit:contain;
}

.nome{font-size:14px;font-weight:bold}
.preco{color:#e60023;font-weight:bold}
.vendidos{font-size:12px;color:#777}

/* BOTÃO */
.botao{
background:#00a650;
color:#fff;
border:none;
padding:10px;
border-radius:6px;
width:100%;
margin-top:5px;
}

/* CONFIANÇA */
.conf{
background:#fff;
margin:10px;
padding:15px;
border-radius:10px;
font-size:13px;
color:#555;
}

/* POPUP */
#popup{
position:fixed;
bottom:20px;
left:20px;
background:#fff;
padding:10px;
border-radius:10px;
display:none;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
font-size:12px;
}
</style>
</head>

<body>

<header>
Vape Store SP
<span class="carrinho-topo" onclick="irCarrinho()">🛒 <span id="count">0</span></span>
</header>

<div class="banner">
🔥 Promoções do dia | Entrega rápida 🚚
</div>

<input id="busca" placeholder="Buscar produtos..." onkeyup="filtrar()">

<!-- PODS -->
<div class="secao">
<div class="titulo-secao">🔥 Pods</div>
<div class="grid" id="pods"></div>
</div>

<!-- ESSENCIAS -->
<div class="secao">
<div class="titulo-secao">💨 Essências</div>
<div class="grid" id="essencias"></div>
</div>

<!-- ACESSORIOS -->
<div class="secao">
<div class="titulo-secao">⚙️ Acessórios</div>
<div class="grid" id="acessorios"></div>
</div>

<!-- CONFIANÇA -->
<div class="conf">
<b>Compra Segura</b><br>
Ambiente protegido e atendimento rápido.<br><br>

<b>Entrega</b><br>
Envio rápido com discrição.<br><br>

<b>Qualidade</b><br>
Produtos selecionados e bem avaliados.
</div>

<div id="popup"></div>

<script>

let produtosGlobal = [];
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

atualizarContador();

fetch("/produtos")
.then(r=>r.json())
.then(data=>{
produtosGlobal = data;
mostrar(data);
});

function criarProduto(p){

const vendidos = Math.floor(Math.random()*200)+20;

return `
<div class="produto">
<img src="${p.img}">
<div class="nome">${p.nome}</div>
<div class="vendidos">🔥 ${vendidos} vendidos</div>
<div class="preco">R$ ${p.preco}</div>
<button class="botao" onclick='addCarrinho(${JSON.stringify(p)})'>Comprar</button>
</div>
`;
}

function mostrar(lista){

let podsHTML="";
let essHTML="";
let accHTML="";

lista.forEach(p=>{
const nome = p.nome.toLowerCase();

if(nome.includes("k") || nome.includes("elf") || nome.includes("ignite")){
podsHTML += criarProduto(p);
}
else if(nome.includes("essencia")){
essHTML += criarProduto(p);
}
else{
accHTML += criarProduto(p);
}
});

document.getElementById("pods").innerHTML = podsHTML;
document.getElementById("essencias").innerHTML = essHTML;
document.getElementById("acessorios").innerHTML = accHTML;
}

function filtrar(){
const termo = document.getElementById("busca").value.toLowerCase();
mostrar(produtosGlobal.filter(p=>p.nome.toLowerCase().includes(termo)));
}

function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
atualizarContador();
mostrarPopup(p.nome);
}

function atualizarContador(){
document.getElementById("count").innerText = carrinho.length;
}

function irCarrinho(){
window.location.href="/checkout.html";
}

function mostrarPopup(nome){
const popup = document.getElementById("popup");
popup.innerText = "🔥 Compra recente: " + nome;
popup.style.display = "block";
setTimeout(()=>popup.style.display="none",3000);
}

</script>

</body>
</html>
