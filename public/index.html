<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Loja de pods, essências e acessórios com entrega rápida.">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}
header{background:#fff;padding:15px;text-align:center;font-weight:bold;border-bottom:1px solid #ddd;position:sticky;top:0}
.carrinho{position:absolute;right:15px;top:15px;background:#00a650;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer}

.hero{background:linear-gradient(120deg,#ff3c00,#ff7b00);color:#fff;padding:40px;text-align:center}
.hero button{padding:10px 20px;border:none;border-radius:20px}

.categorias{display:flex;justify-content:space-around;background:#fff;padding:10px}
.categorias div{background:#eee;padding:10px;border-radius:10px;cursor:pointer}

#lista{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}

.produto{background:#fff;padding:10px;border-radius:10px}
.produto img{width:100%;height:120px;object-fit:contain}

.botao{background:#00a650;color:#fff;border:none;padding:10px;width:100%;margin-top:5px}
</style>
</head>

<body>

<header>
Vape Store SP
<span class="carrinho" onclick="location.href='checkout.html'">🛒 <span id="count">0</span></span>
</header>

<div class="hero">
<h2>🔥 Loja Oficial de Pods</h2>
<p>Entrega rápida | Compra segura</p>
<button onclick="window.scrollTo(0,400)">Ver produtos</button>
</div>

<div class="categorias">
<div onclick="filtro('pods')">Pods</div>
<div onclick="filtro('essencias')">Essências</div>
<div onclick="filtro('acessorios')">Acessórios</div>
</div>

<div id="lista"></div>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];
document.getElementById("count").innerText = carrinho.length;

let produtos=[];

fetch("/produtos").then(r=>r.json()).then(d=>{
produtos=d;
mostrar(d);
});

function mostrar(lista){
document.getElementById("lista").innerHTML="";
lista.forEach(p=>{
document.getElementById("lista").innerHTML+=`
<div class="produto">
<img src="${p.img}">
<b>${p.nome}</b>
<div>R$ ${p.preco}</div>
<button class="botao" onclick='verProduto(${JSON.stringify(p)})'>Ver</button>
</div>`;
});
}

function verProduto(p){
localStorage.setItem("produtoAtual", JSON.stringify(p));
location.href="produto.html";
}

function filtro(tipo){
if(tipo=="pods"){
mostrar(produtos.filter(p=>p.nome.toLowerCase().includes("k")||p.nome.toLowerCase().includes("elf")));
}
}
</script>

</body>
</html>
