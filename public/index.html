<!DOCTYPE html>
<html>
<head>
<title>Minha Loja</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#ee4d2d;
color:#fff;
padding:15px;
text-align:center;
font-size:18px;
}

.tabs{
display:flex;
gap:10px;
padding:10px;
overflow:auto;
background:#fff;
}

.tab{
background:#eee;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
white-space:nowrap;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:#fff;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
height:140px;
object-fit:contain;
}

button{
background:#ee4d2d;
color:#fff;
border:none;
padding:8px;
border-radius:6px;
width:100%;
cursor:pointer;
}
</style>

</head>

<body>

<header>🛒 Minha Loja</header>

<!-- ❌ SEM BANNER PRA NÃO QUEBRAR -->

<div class="tabs" id="tabs"></div>

<div class="grid" id="produtos"></div>

<script>

let produtos = [];

/* CARREGA PRODUTOS */
fetch("/produtos")
.then(r=>r.json())
.then(d=>{
produtos = d;
render(d);
renderTabs(d);
});

/* RENDER PRODUTOS */
function render(data){
const div=document.getElementById("produtos");
div.innerHTML="";

data.forEach(p=>{
div.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.nome}</h3>
<p>R$ ${p.preco}</p>
<button onclick="buy('${p.nome}',${p.preco})">Comprar</button>
</div>`;
});
}

/* CATEGORIAS (SEM undefined) */
function renderTabs(data){
const cats=[...new Set(data
.filter(p=>p.categoria)
.map(p=>p.categoria)
)];

document.getElementById("tabs").innerHTML=
`<div class="tab" onclick="render(produtos)">Todos</div>`+
cats.map(c=>`
<div class="tab" onclick="filter('${c}')">${c}</div>
`).join("");
}

/* FILTRO */
function filter(cat){
render(produtos.filter(p=>p.categoria===cat));
}

/* WHATSAPP */
function buy(nome,preco){
window.open("https://wa.me/5599999999999?text=Quero "+nome);
}

</script>

</body>
</html>
