<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f0f14;color:#fff}

/* HEADER */
header{
background:#1a1a22;
padding:15px;
text-align:center;
position:sticky;
top:0;
}

.carrinho{
position:absolute;
right:15px;
top:15px;
background:#00a650;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

/* HERO */
.hero{
background:linear-gradient(120deg,#ff3c00,#ff7b00);
padding:40px;
text-align:center;
}

/* CONFIANÇA */
.trust{
display:flex;
justify-content:space-around;
background:#1a1a22;
padding:10px;
font-size:12px;
}

/* GRID */
#lista{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.produto{
background:#1a1a22;
padding:10px;
border-radius:10px;
transition:0.2s;
}
.produto:hover{transform:scale(1.03)}

.produto img{
width:100%;
height:120px;
object-fit:contain;
}

/* BOTÕES */
.btn{
padding:8px;
border:none;
border-radius:6px;
width:100%;
margin-top:5px;
cursor:pointer;
font-weight:bold;
}

.ver{background:#444;color:#fff;}
.comprar{background:#00a650;color:#fff;}

/* POPUP BONITO */
.popup{
position:fixed;
bottom:20px;
left:20px;
background:#1a1a22;
padding:10px;
border-radius:10px;
font-size:12px;
display:none;
box-shadow:0 0 10px rgba(0,0,0,0.5);
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>
🔥 Vape Store SP
<div class="carrinho" onclick="irCarrinho()">🛒 <span id="count">0</span></div>
</header>

<div class="hero">
<h2>🔥 Promoções do dia</h2>
<p>Entrega rápida • Produtos premium</p>
</div>

<div class="trust">
<span>🚚 Envio rápido</span>
<span>🔒 Seguro</span>
<span>⭐ 4.9 Avaliação</span>
</div>

<div id="lista"></div>

<div class="popup" id="popup"></div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];
document.getElementById("count").innerText = carrinho.length;

let produtos=[];

fetch("/produtos").then(r=>r.json()).then(d=>{
produtos=d;
mostrar(d);
});

function mostrar(lista){
document.getElementById("lista").innerHTML="";
lista.forEach(p=>{
document.getElementById("lista").innerHTML+=`
<div class="produto">
<img src="${p.img}">
<b>${p.nome}</b>
<div>R$ ${p.preco}</div>

<button class="btn ver" onclick='verProduto(${JSON.stringify(p)})'>Ver</button>
<button class="btn comprar" onclick='addCarrinho(${JSON.stringify(p)})'>Comprar</button>
</div>`;
});
}

function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
document.getElementById("count").innerText = carrinho.length;
mostrarPopup("Adicionado ao carrinho 🔥");
}

function verProduto(p){
localStorage.setItem("produtoAtual", JSON.stringify(p));
location.href="produto.html";
}

function irCarrinho(){
location.href="checkout.html";
}

/* POPUP BONITO */
function mostrarPopup(msg){
const popup=document.getElementById("popup");
popup.innerText=msg;
popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},3000);
}

/* POPUP SOCIAL (FAKE SUAVE) */
setInterval(()=>{
const nomes=["Lucas","Ana","Pedro","Julia"];
const prods=["Elfbar","Ignite","Oxbar"];

mostrarPopup(nomes[Math.floor(Math.random()*nomes.length)]+" comprou "+prods[Math.floor(Math.random()*prods.length)]);
},20000);

</script>

</body>
</html>
