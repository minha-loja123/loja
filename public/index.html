<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#0f0f14;color:#fff}

header{
background:#1a1a22;
padding:15px;
text-align:center;
position:sticky;
top:0;
}

.carrinho{
position:absolute;
right:15px;
top:15px;
background:#00a650;
padding:6px 10px;
border-radius:20px;
cursor:pointer;
}

.hero{
background:linear-gradient(120deg,#ff3c00,#ff7b00);
padding:40px;
text-align:center;
}

.hero button{
padding:10px 20px;
border:none;
border-radius:20px;
}

#lista{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.produto{
background:#1a1a22;
padding:10px;
border-radius:10px;
}

.produto img{
width:100%;
height:120px;
object-fit:contain;
}

.btn{
padding:8px;
border:none;
border-radius:6px;
width:100%;
margin-top:5px;
cursor:pointer;
font-weight:bold;
}

.ver{background:#444;color:#fff;}
.comprar{background:#00a650;color:#fff;}
</style>
</head>

<body>

<header>
🔥 Vape Store SP
<div class="carrinho" onclick="irCarrinho()">🛒 <span id="count">0</span></div>
</header>

<div class="hero">
<h2>🔥 Ofertas do dia</h2>
<p>Entrega rápida • Qualidade garantida</p>
<button onclick="scrollProdutos()">Ver produtos</button>
</div>

<div id="lista"></div>

<script>

let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];
document.getElementById("count").innerText = carrinho.length;

let produtos=[];

fetch("/produtos").then(r=>r.json()).then(d=>{
produtos=d;
mostrar(d);
});

function mostrar(lista){
document.getElementById("lista").innerHTML="";
lista.forEach(p=>{
document.getElementById("lista").innerHTML+=`
<div class="produto">
<img src="${p.img}">
<b>${p.nome}</b>
<div>R$ ${p.preco}</div>

<button class="btn ver" onclick='verProduto(${JSON.stringify(p)})'>Ver</button>
<button class="btn comprar" onclick='addCarrinho(${JSON.stringify(p)})'>Comprar</button>
</div>`;
});
}

function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
document.getElementById("count").innerText = carrinho.length;
alert("Adicionado ao carrinho");
}

function verProduto(p){
localStorage.setItem("produtoAtual", JSON.stringify(p));
location.href="produto.html";
}

function irCarrinho(){
location.href="checkout.html";
}

function scrollProdutos(){
window.scrollTo({top:300,behavior:"smooth"});
}

/* POPUP DE URGÊNCIA */
setInterval(()=>{
const nomes=["Lucas","Ana","Pedro","Julia"];
const produtosFake=["Elfbar","Ignite","Oxbar"];

const nome=nomes[Math.floor(Math.random()*nomes.length)];
const prod=produtosFake[Math.floor(Math.random()*produtosFake.length)];

alert("🔥 "+nome+" acabou de comprar "+prod);
},25000);

</script>

</body>
</html>
