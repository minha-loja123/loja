<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

header{
background:#fff;
padding:15px;
text-align:center;
font-weight:bold;
border-bottom:1px solid #ddd;
}

#busca{
width:90%;
margin:10px auto;
display:block;
padding:10px;
border-radius:20px;
border:1px solid #ccc;
}

.produto{
display:flex;
background:#fff;
margin:10px;
padding:10px;
border-radius:10px;
align-items:center;
}

.produto img{
width:70px;
margin-right:10px;
}

.info{flex:1}

.botao{
background:#ee4d2d;
color:#fff;
border:none;
padding:8px 12px;
border-radius:20px;
cursor:pointer;
margin-top:5px;
}
</style>
</head>

<body>

<header>🔥 Vape Store SP</header>

<input id="busca" placeholder="Buscar..." onkeyup="filtrar()">

<a href="/checkout.html">
<button style="margin:10px;width:90%;padding:12px;background:#ee4d2d;color:#fff;border:none;border-radius:25px">
🛒 Ir para Carrinho
</button>
</a>

<div id="lista"></div>

<script>

let produtosGlobal = [];
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

/* CARREGAR PRODUTOS */
fetch("/produtos")
.then(r=>r.json())
.then(data=>{
produtosGlobal = data;
mostrar(data);
});

/* CRIAR PRODUTO */
function criarProduto(p){

const item = document.createElement("div");
item.className="produto";

item.innerHTML = `
<img src="${p.img}">

<div class="info">
<b>${p.nome}</b><br>
R$ ${p.preco}<br>

<button class="botao" onclick='addCarrinho(${JSON.stringify(p)})'>
Adicionar
</button>

</div>
`;

document.getElementById("lista").appendChild(item);
}

/* MOSTRAR */
function mostrar(lista){
document.getElementById("lista").innerHTML="";
lista.forEach(p=>criarProduto(p));
}

/* BUSCA */
function filtrar(){
const termo = document.getElementById("busca").value.toLowerCase();
const filtrados = produtosGlobal.filter(p =>
p.nome.toLowerCase().includes(termo)
);
mostrar(filtrados);
}

/* CARRINHO */
function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
alert("Produto adicionado");
}

</script>

</body>
</html>
