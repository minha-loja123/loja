<!DOCTYPE html>
<html>
<head>
<title>Vape Store SP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#0f0f14;
color:#fff;
}

/* HEADER */
header{
background:#1a1a22;
padding:15px;
text-align:center;
font-weight:bold;
position:sticky;
top:0;
z-index:10;
}

/* CARRINHO CONTADOR */
.carrinho-topo{
position:absolute;
right:15px;
top:15px;
background:#ff3c00;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* BUSCA */
#busca{
width:90%;
margin:10px auto;
display:block;
padding:12px;
border-radius:20px;
border:none;
background:#1e1e28;
color:#fff;
}

/* GRID */
#lista{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:10px;
}

.produto{
background:#1a1a22;
border-radius:12px;
padding:10px;
transition:0.2s;
}
.produto:hover{transform:scale(1.02)}

.produto img{
width:100%;
height:120px;
object-fit:contain;
}

/* INFO */
.nome{font-size:13px;font-weight:bold}
.preco{color:#ff3c00;font-weight:bold}
.vendidos{font-size:11px;color:#aaa}

/* ESTRELAS */
.estrelas{color:gold;font-size:12px}

/* BOTÃO */
.botao{
background:linear-gradient(90deg,#ff3c00,#ff7b00);
border:none;
color:#fff;
padding:8px;
border-radius:20px;
width:100%;
margin-top:5px;
}

/* POPUP */
#popup{
position:fixed;
bottom:20px;
left:20px;
background:#1a1a22;
padding:10px;
border-radius:10px;
display:none;
font-size:12px;
}
</style>
</head>

<body>

<header>
🔥 Vape Store SP
<span class="carrinho-topo" onclick="irCarrinho()">
🛒 <span id="count">0</span>
</span>
</header>

<input id="busca" placeholder="Buscar..." onkeyup="filtrar()">

<div id="lista"></div>

<div id="popup"></div>

<script>

let produtosGlobal = [];
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

atualizarContador();

fetch("/produtos")
.then(r=>r.json())
.then(data=>{
produtosGlobal = data;
mostrar(data);
});

function criarProduto(p){

const vendidos = Math.floor(Math.random()*300)+50;
const estrelas = "★★★★★";

const item = document.createElement("div");
item.className="produto";

item.innerHTML = `
<img src="${p.img}">
<div class="nome">${p.nome}</div>
<div class="estrelas">${estrelas}</div>
<div class="vendidos">${vendidos} vendidos</div>
<div class="preco">R$ ${p.preco}</div>
<button class="botao" onclick='addCarrinho(${JSON.stringify(p)})'>Comprar</button>
`;

document.getElementById("lista").appendChild(item);
}

function mostrar(lista){
document.getElementById("lista").innerHTML="";
lista.forEach(p=>criarProduto(p));
}

function filtrar(){
const termo = document.getElementById("busca").value.toLowerCase();
mostrar(produtosGlobal.filter(p=>p.nome.toLowerCase().includes(termo)));
}

function addCarrinho(p){
carrinho.push(p);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
atualizarContador();
mostrarPopup(p.nome);
}

function atualizarContador(){
document.getElementById("count").innerText = carrinho.length;
}

function irCarrinho(){
window.location.href="/checkout.html";
}

/* POPUP FAKE */
function mostrarPopup(nome){
const popup = document.getElementById("popup");
popup.innerText = "🔥 Alguém comprou: " + nome;
popup.style.display = "block";

setTimeout(()=>{
popup.style.display = "none";
},3000);
}

</script>

</body>
</html>
