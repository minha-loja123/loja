<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<meta name="viewport" content="width=device-width">

<style>
body{background:#0f0f14;color:#fff;font-family:Arial;padding:10px}

.card{
background:#1a1a22;
padding:10px;
margin:10px 0;
border-radius:10px;
}

button{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.remover{background:red;color:#fff}
.pagar{background:#00a650;color:#fff}
.voltar{background:#444;color:#fff}
</style>
</head>

<body>

<h2>🛒 Seu Carrinho</h2>

<div id="lista"></div>
<h3 id="total"></h3>

<button class="pagar" onclick="pagar()">Finalizar compra</button>
<button class="voltar" onclick="location.href='index.html'">Continuar comprando</button>

<script>
let carrinho = JSON.parse(localStorage.getItem("carrinho"))||[];

let html="";
let total=0;

carrinho.forEach((p,i)=>{
html+=`
<div class="card">
${p.nome} - R$ ${p.preco}
<button class="remover" onclick="remover(${i})">Remover</button>
</div>`;
total+=p.preco;
});

document.getElementById("lista").innerHTML=html;
document.getElementById("total").innerText="Total: R$ "+total;

function remover(i){
carrinho.splice(i,1);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
location.reload();
}

function pagar(){
window.location.href="https://dentpeg.com/checkout/vape-store";
}
</script>

</body>
</html>
