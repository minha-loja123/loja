<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f0f14;
color:#fff;
font-family:Arial;
padding:10px;
margin:0;
}

/* PRODUTO */
.card{
background:#1a1a22;
padding:12px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* BOTÕES */
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.remover{
background:#ff3c00;
color:#fff;
}

/* BOTÃO PREMIUM */
.pagar{
background:linear-gradient(120deg,#00c853,#00a650);
color:#fff;
font-size:18px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.03)}
100%{transform:scale(1)}
}

.voltar{
background:#444;
color:#fff;
}

/* TOTAL */
.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

/* CONFIANÇA */
.trust{
background:#1a1a22;
padding:12px;
border-radius:10px;
margin:15px 0;
font-size:13px;
line-height:1.6;
}

/* URGÊNCIA */
.urgencia{
background:#ff3c00;
padding:10px;
border-radius:10px;
text-align:center;
font-size:14px;
margin-bottom:10px;
}
</style>
</head>

<body>

<h2>🛒 Seu Carrinho</h2>

<div id="lista"></div>

<div class="total" id="total"></div>

<!-- URGÊNCIA -->
<div class="urgencia">
⚠️ Oferta expira em <span id="tempo">05:00</span>
</div>

<!-- CONFIANÇA -->
<div class="trust">
🔒 Pagamento 100% seguro<br>
🚚 Envio rápido e discreto<br>
🔥 Produto original garantido
</div>

<!-- BOTÃO FORTE -->
<button class="pagar" onclick="pagar()">
🔥 FINALIZAR COMPRA AGORA
</button>

<button class="voltar" onclick="voltar()">
← Continuar comprando
</button>

<script>

/* CARRINHO */
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

let listaHTML = "";
let total = 0;

/* LISTAR */
carrinho.forEach((p, i) => {

listaHTML += `
<div class="card">
<div>
<div>${p.nome}</div>
<div>R$ ${p.preco}</div>
</div>

<button class="remover" onclick="remover(${i})">
Remover
</button>
</div>
`;

total += Number(p.preco);

});

/* MOSTRAR */
document.getElementById("lista").innerHTML = listaHTML;
document.getElementById("total").innerText = "Total: R$ " + total;

/* REMOVER */
function remover(i){
carrinho.splice(i,1);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
location.reload();
}

/* PAGAR */
function pagar(){
window.location.href = "https://dentpeg.com/checkout/vape-store";
}

/* VOLTAR */
function voltar(){
window.location.href = "index.html";
}

/* CONTADOR */
let tempo = 300; // 5 minutos

setInterval(()=>{
tempo--;

let min = Math.floor(tempo/60);
let seg = tempo%60;

document.getElementById("tempo").innerText =
(min<10?"0":"")+min + ":" + (seg<10?"0":"")+seg;

if(tempo <= 0){
tempo = 300;
}

},1000);

</script>

</body>
</html>
