<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f0f14;
color:#fff;
font-family:Arial;
padding:10px;
margin:0;
}

/* CARD PRODUTO */
.card{
background:#1a1a22;
padding:12px;
margin:10px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* BOTÕES */
button{
width:100%;
padding:12px;
margin-top:8px;
border:none;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.remover{
background:#ff3c00;
color:#fff;
}

.pagar{
background:#00a650;
color:#fff;
font-size:16px;
}

.voltar{
background:#444;
color:#fff;
}

/* TOTAL */
.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

/* BLOCO CONFIANÇA */
.trust{
background:#1a1a22;
padding:12px;
border-radius:10px;
margin:15px 0;
font-size:13px;
line-height:1.6;
}

/* HEADER */
h2{
margin-top:0;
}
</style>
</head>

<body>

<h2>🛒 Seu Carrinho</h2>

<div id="lista"></div>

<div class="total" id="total"></div>

<!-- BLOCO DE CONFIANÇA -->
<div class="trust">
🔒 Pagamento 100% seguro<br>
🚚 Envio rápido e discreto<br>
🔥 Produto original garantido
</div>

<button class="pagar" onclick="pagar()">
🔥 FINALIZAR COMPRA SEGURA
</button>

<button class="voltar" onclick="voltar()">
← Continuar comprando
</button>

<script>

/* CARRINHO */
let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];

let listaHTML = "";
let total = 0;

/* LISTAR PRODUTOS */
carrinho.forEach((p, i) => {

listaHTML += `
<div class="card">
<div>
<div>${p.nome}</div>
<div>R$ ${p.preco}</div>
</div>

<button class="remover" onclick="remover(${i})">
Remover
</button>
</div>
`;

total += Number(p.preco);

});

/* MOSTRAR */
document.getElementById("lista").innerHTML = listaHTML;
document.getElementById("total").innerText = "Total: R$ " + total;

/* REMOVER */
function remover(i){
carrinho.splice(i,1);
localStorage.setItem("carrinho", JSON.stringify(carrinho));
location.reload();
}

/* PAGAR */
function pagar(){
window.location.href = "https://dentpeg.com/checkout/vape-store";
}

/* VOLTAR */
function voltar(){
window.location.href = "index.html";
}

</script>

</body>
</html>
