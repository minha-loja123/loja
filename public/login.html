<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <style>
    body{
      font-family: Arial;
      background:#f5f5f5;
      text-align:center;
      padding-top:100px;
    }

    input{
      padding:10px;
      margin:5px;
      width:200px;
    }

    button{
      padding:10px;
      width:220px;
      background:#ee4d2d;
      color:white;
      border:none;
      cursor:pointer;
      border-radius:5px;
    }
  </style>
</head>

<body>

<h2>Login da Loja</h2>

<input id="email" placeholder="email"><br>
<input id="senha" placeholder="senha"><br><br>

<button onclick="login()">Entrar</button>

<script>

function login(){
  fetch("http://localhost:3000/login", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      email: document.getElementById("email").value,
      senha: document.getElementById("senha").value
    })
  })
  .then(r => r.json())
  .then(data => {
    if(data.ok){
      localStorage.setItem("usuario", data.usuario);
      alert("Login feito com sucesso!");
      window.location.href = "/";
    } else {
      alert("Login inválido!");
    }
  })
  .catch(err => {
    console.log(err);
  });
}

</script>

</body>
</html>
